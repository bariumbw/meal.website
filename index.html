<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上點餐系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-lg relative pb-24">
        
        <header class="bg-white p-4 border-b border-gray-100 flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center space-x-2">
                <span class="bg-red-100 text-red-600 text-xs font-bold px-2.5 py-1 rounded">Closed Today</span>
                <span class="bg-gray-100 text-gray-700 text-xs font-medium px-2.5 py-1 rounded">Pick Up</span>
            </div>
            <div class="flex items-center space-x-3 text-sm text-gray-600">
                <button class="hover:underline font-medium">Store Information</button>
                <span class="border-l h-4 border-gray-300"></span>
                <button class="border border-gray-300 rounded px-1.5 py-0.5 text-xs font-bold">EN</button>
            </div>
        </header>

        <main id="page-home" class="page-content flex-1 p-4 overflow-y-auto">
            <div class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white p-6 rounded-2xl shadow-sm mb-6">
                <h1 class="text-2xl font-bold mb-2">歡迎光臨！</h1>
                <p class="text-sm opacity-90">今天想吃點什麼呢？點擊下方菜單開始點餐。</p>
            </div>
            <h3 class="font-bold text-gray-800 mb-3">最新公告</h3>
            <div class="bg-gray-50 border border-gray-100 p-4 rounded-xl text-sm text-gray-600 mb-4">
                📢 今日因設備維護，暫不開放線上點餐，僅供瀏覽菜單。
            </div>
            <button onclick="switchPage('menu')" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold shadow-sm hover:bg-gray-800 transition">
                前往瀏覽菜單 ➔
            </button>
        </main>

        <main id="page-menu" class="page-content hidden flex-1 p-4 overflow-y-auto">
            <h2 class="text-xl font-bold text-gray-800 mb-4">線上菜單</h2>
            <div id="product-list" class="space-y-4"></div>
        </main>

        <main id="page-orders" class="page-content hidden flex-1 p-4 overflow-y-auto">
            <h2 class="text-xl font-bold text-gray-800 mb-4">我的訂單</h2>
            <div class="flex flex-col items-center justify-center pt-12 text-gray-400">
                <span class="text-5xl mb-3">🛍️</span>
                <p class="text-sm">目前沒有進行中的訂單</p>
            </div>
        </main>

        <main id="page-profile" class="page-content hidden flex-1 p-4 overflow-y-auto">
            <h2 class="text-xl font-bold text-gray-800 mb-4">會員中心</h2>
            <div class="bg-gray-50 p-4 rounded-xl flex items-center space-x-3 border border-gray-100 mb-4">
                <div class="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center text-xl text-white font-bold">G</div>
                <div>
                    <h4 class="font-bold text-gray-800">GUEST 訪客</h4>
                    <p class="text-xs text-gray-500">登入後即可同步訂單紀錄</p>
                </div>
            </div>
            <button onclick="alert('登入功能需要串接後台資料庫唷！')" class="w-full border border-gray-300 text-gray-700 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50 transition">
                登入 / 註冊
            </button>
        </main>

        <div id="cart-bar" class="hidden fixed bottom-18 left-0 right-0 max-w-sm mx-auto bg-emerald-600 text-white mx-4 rounded-xl p-3 flex justify-between items-center shadow-lg z-20">
            <div class="flex items-center space-x-2">
                <span id="cart-count" class="bg-emerald-800 text-white text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                <span class="font-medium text-sm">已加入購物車</span>
            </div>
            <button onclick="checkout()" class="flex items-center space-x-1 font-bold text-sm bg-emerald-700 hover:bg-emerald-800 px-3 py-1.5 rounded-lg transition">
                <span id="cart-total">$0</span>
                <span>去結帳 ❯</span>
            </button>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 flex justify-around py-2 z-10">
            <button id="nav-home" onclick="switchPage('home')" class="nav-btn flex flex-col items-center text-gray-400 hover:text-gray-800">
                <span class="text-xl">🏠</span><span class="text-xs mt-0.5">Home</span>
            </button>
            <button id="nav-menu" onclick="switchPage('menu')" class="nav-btn flex flex-col items-center text-emerald-600 font-medium">
                <span class="text-xl">📋</span><span class="text-xs mt-0.5">Menu</span>
            </button>
            <button id="nav-orders" onclick="switchPage('orders')" class="nav-btn flex flex-col items-center text-gray-400 hover:text-gray-800">
                <span class="text-xl">🛍️</span><span class="text-xs mt-0.5">Orders</span>
            </button>
            <button id="nav-profile" onclick="switchPage('profile')" class="nav-btn flex flex-col items-center text-gray-400 hover:text-gray-800">
                <span class="text-xl">👤</span><span class="text-xs mt-0.5">Profile</span>
            </button>
        </nav>

    </div>

    <script>
        // 1. 商品資料
        const products = [
            { id: 1, name: '招牌經典牛肉堡', price: 180, description: '多汁牛肉排搭配秘製醬汁', image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500' },
            { id: 2, name: '美式脆薯', price: 60, description: '現炸金黃酥脆', image: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500' },
            { id: 3, name: '冰美式咖啡', price: 75, description: '嚴選阿拉比卡豆', image: 'https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=500' }
        ];

        let cart = {}; // 購物車狀態 { 商品ID: 數量 }

        // 2. 多頁面切換邏輯
        function switchPage(pageName) {
            // 隱藏所有頁面
            document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
            // 顯示點選的頁面
            document.getElementById(`page-${pageName}`).classList.remove('hidden');

            // 重設所有導覽列按鈕顏色
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('text-emerald-600', 'font-medium');
                el.classList.add('text-gray-400');
            });
            // 高亮目前選中的按鈕
            const activeNav = document.getElementById(`nav-${pageName}`);
            activeNav.classList.remove('text-gray-400');
            activeNav.classList.add('text-emerald-600', 'font-medium');
        }

        // 3. 渲染商品列表
        function renderProducts() {
            const container = document.getElementById('product-list');
            if(!container) return;
            
            container.innerHTML = products.map(p => {
                const quantity = cart[p.id] || 0;
                
                const actionButton = quantity > 0  
                    ? `<div class="flex items-center space-x-2 bg-gray-100 rounded-full p-1 border border-gray-200">
                        <button onclick="updateCart(${p.id}, -1)" class="w-6 h-6 rounded-full bg-white flex items-center justify-center text-gray-600 font-bold hover:bg-gray-200">-</button>
                        <span class="text-xs font-bold text-gray-800 w-4 text-center">${quantity}</span>
                        <button onclick="updateCart(${p.id}, 1)" class="w-6 h-6 rounded-full bg-gray-900 text-white flex items-center justify-center font-bold hover:bg-gray-800">+</button>
                       </div>`
                    : `<button onclick="updateCart(${p.id}, 1)" class="bg-gray-900 text-white text-xs px-3 py-1.5 rounded-full hover:bg-gray-800 transition shadow-sm">＋ 加入</button>`;

                return `
                    <div class="bg-white rounded-xl p-3 flex shadow-sm border border-gray-100 transition-all hover:border-gray-200">
                        <img src="${p.image}" alt="${p.name}" class="w-24 h-24 object-cover rounded-lg bg-gray-100 flex-shrink-0" />
                        <div class="ml-3 flex flex-col justify-between flex-1">
                            <div>
                                <h3 class="font-semibold text-gray-800 text-base">${p.name}</h3>
                                <p class="text-xs text-gray-500 mt-1 line-clamp-2">${p.description}</p>
                            </div>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-emerald-600 font-bold">$${p.price}</span>
                                <div>${actionButton}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 4. 更新購物車數量
        function updateCart(productId, change) {
            const currentQty = cart[productId] || 0;
            const newQty = currentQty + change;

            if (newQty <= 0) {
                delete cart[productId];
            } else {
                cart[productId] = newQty;
            }

            renderProducts();
            updateCartBar();
        }

        // 5. 更新購物車通知條
        function updateCartBar() {
            const cartBar = document.getElementById('cart-bar');
            const cartCount = document.getElementById('cart-count');
            const cartTotal = document.getElementById('cart-total');
            
            let totalItems = 0;
            let totalPrice = 0;

            for (const id in cart) {
                const product = products.find(p => p.id == id);
                if (product) {
                    totalItems += cart[id];
                    totalPrice += product.price * cart[id];
                }
            }

            if (totalItems > 0) {
                cartBar.classList.remove('hidden');
                cartCount.innerText = totalItems;
                cartTotal.innerText = `$${totalPrice}`;
            } else {
                cartBar.classList.add('hidden');
            }
        }

        function checkout() {
            let totalPrice = document.getElementById('cart-total').innerText;
            alert(`感謝點餐！即將為您處理訂單，總金額為：${totalPrice}`);
        }

        // 初始化
        renderProducts();
        // 預設先顯示 menu 頁面
        switchPage('menu');
    </script>
</body>
</html>
