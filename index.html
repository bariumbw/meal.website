<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上點餐系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-lg relative pb-24">
        
        <header class="bg-white p-4 border-b border-gray-100 flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center space-x-2">
                <span class="bg-red-100 text-red-600 text-xs font-bold px-2.5 py-1 rounded">Closed Today</span>
                <span class="bg-gray-100 text-gray-700 text-xs font-medium px-2.5 py-1 rounded">Pick Up</span>
            </div>
            <div class="flex items-center space-x-3 text-sm text-gray-600">
                <button class="hover:underline font-medium">Store Information</button>
                <span class="border-l h-4 border-gray-300"></span>
                <button class="border border-gray-300 rounded px-1.5 py-0.5 text-xs font-bold">EN</button>
            </div>
        </header>

        <main class="flex-1 p-4 overflow-y-auto">
            <h2 class="text-xl font-bold text-gray-800 mb-4">線上菜單</h2>
            
            <div id="product-list" class="space-y-4">
                </div>
        </main>

        <div id="cart-bar" class="hidden fixed bottom-18 left-0 right-0 max-w-sm mx-auto bg-emerald-600 text-white mx-4 rounded-xl p-3 flex justify-between items-center shadow-lg z-20 animate-bounce-short">
            <div class="flex items-center space-x-3">
                <span class="bg-emerald-800 text-white text-xs font-bold px-2 py-1 rounded-full id='cart-count'">0</span>
                <span class="font-medium text-sm">購物車已點餐點</span>
            </div>
            <button onclick="checkout()" class="flex items-center space-x-1 font-bold text-sm bg-emerald-700 hover:bg-emerald-800 px-3 py-1.5 rounded-lg transition">
                <span id="cart-total">$0</span>
                <span>去結帳 ❯</span>
            </button>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 flex justify-around py-2 z-10">
            <button class="flex flex-col items-center text-gray-400 hover:text-gray-800">
                <span class="text-xl">🏠</span><span class="text-xs mt-0.5">Home</span>
            </button>
            <button class="flex flex-col items-center text-emerald-600 font-medium">
                <span class="text-xl">📋</span><span class="text-xs mt-0.5">Menu</span>
            </button>
            <button class="flex flex-col items-center text-gray-400 hover:text-gray-800">
                <span class="text-xl">🛍️</span><span class="text-xs mt-0.5">Orders</span>
            </button>
            <button class="flex flex-col items-center text-gray-400 hover:text-gray-800">
                <span class="text-xl">👤</span><span class="text-xs mt-0.5">Profile</span>
            </button>
        </nav>

    </div>

    <script>
        // 商品資料
        const products = [
            { id: 1, name: '招牌經典牛肉堡', price: 180, description: '多汁牛肉排搭配秘製醬汁', image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500' },
            { id: 2, name: '美式脆薯', price: 60, description: '現炸金黃酥脆', image: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500' },
            { id: 3, name: '冰美式咖啡', price: 75, description: '嚴選阿拉比卡豆', image: 'https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=500' }
        ];

        // 儲存購物車狀態的物件 { 商品ID: 數量 }
        let cart = {};

        // 渲染商品列表
        function renderProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = products.map(p => {
                const quantity = cart[p.id] || 0;
                
                // 根據有沒有選擇商品，切換按鈕樣式
                const actionButton = quantity > 0  
                    ? `<div class="flex items-center space-x-2 bg-gray-100 rounded-full p-1 border border-gray-200">
                        <button onclick="updateCart(${p.id}, -1)" class="w-6 h-6 rounded-full bg-white flex items-center justify-center text-gray-600 font-bold hover:bg-gray-200">-</button>
                        <span class="text-xs font-bold text-gray-800 w-4 text-center">${quantity}</span>
                        <button onclick="updateCart(${p.id}, 1)" class="w-6 h-6 rounded-full bg-gray-900 text-white flex items-center justify-center font-bold hover:bg-gray-800">+</button>
                       </div>`
                    : `<button onclick="updateCart(${p.id}, 1)" class="bg-gray-900 text-white text-xs px-3 py-1.5 rounded-full hover:bg-gray-800 transition shadow-sm">＋ 加入</button>`;

                return `
                    <div class="bg-white rounded-xl p-3 flex shadow-sm border border-gray-100 transition-all hover:border-gray-200">
                        <img src="${p.image}" alt="${p.name}" class="w-24 h-24 object-cover rounded-lg bg-gray-100 flex-shrink-0" />
                        <div class="ml-3 flex flex-col justify-between flex-1">
                            <div>
                                <h3 class="font-semibold text-gray-800 text-base">${p.name}</h3>
                                <p class="text-xs text-gray-500 mt-1 line-clamp-2">${p.description}</p>
                            </div>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-emerald-600 font-bold">$${p.price}</span>
                                <div id="btn-container-${p.id}">${actionButton}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新購物車數量
        function updateCart(productId, change) {
            const currentQty = cart[productId] || 0;
            const newQty = currentQty + change;

            if (newQty <= 0) {
                delete cart[productId];
            } else {
                cart[productId] = newQty;
            }

            // 重新渲染畫面
            renderProducts();
            updateCartBar();
        }

        // 更新底部購物車跳出條
        function updateCartBar() {
            const cartBar = document.getElementById('cart-bar');
            let totalItems = 0;
            let totalPrice = 0;

            // 計算總量與總價
            for (const id in cart) {
                const product = products.find(p => p.id == id);
                if (product) {
                    totalItems += cart[id];
                    totalPrice += product.price * cart[id];
                }
            }

            if (totalItems > 0) {
                cartBar.classList.remove('hidden');
                cartBar.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <span class="bg-emerald-800 text-white text-xs font-bold px-2 py-0.5 rounded-full">${totalItems}</span>
                        <span class="font-medium text-sm">已加入購物車</span>
                    </div>
                    <button onclick="checkout(${totalPrice})" class="flex items-center space-x-1 font-bold text-sm bg-emerald-700 hover:bg-emerald-800 px-3 py-1.5 rounded-lg transition">
                        <span>$${totalPrice}</span>
                        <span>去結帳 ❯</span>
                    </button>
                `;
            } else {
                cartBar.classList.add('hidden');
            }
        }

        // 點擊結帳的動作
        function checkout(price) {
            alert(`感謝您的點餐！即將為您導向金流支付，總金額為：$${price} 元。`);
        }

        // 網頁載入時初始化
        renderProducts();
    </script>
</body>
</html>
